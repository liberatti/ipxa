<div class="admin-view-header">
  <h2 class="gradient-text">Feeds Management</h2>
  <button mat-flat-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Create Feed
  </button>
</div>

<mat-card class="glass-card">
  <div class="table-responsive">
    <table mat-table [dataSource]="feedDS" class="admin-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let feed"> 
          <div class="feed-name-cell">
            <span class="feed-name">{{feed.name}}</span>
            <small class="feed-slug">{{feed.slug}}</small>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="provider">
        <th mat-header-cell *matHeaderCellDef> Provider </th>
        <td mat-cell *matCellDef="let feed"> {{feed.provider}} </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let feed"> 
          <span class="badge" [class]="feed.type">{{feed.type}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="format">
        <th mat-header-cell *matHeaderCellDef> Format </th>
        <td mat-cell *matCellDef="let feed"> <code class="small-code">{{feed.format}}</code> </td>
      </ng-container>

      <ng-container matColumnDef="risk_score">
        <th mat-header-cell *matHeaderCellDef> Risk </th>
        <td mat-cell *matCellDef="let feed"> 
          <span class="risk-indicator" [style.background-color]="feed.risk_score > 7 ? 'var(--danger-color)' : (feed.risk_score > 3 ? 'var(--warning-color)' : 'var(--success-color)')">
            {{feed.risk_score}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let feed">
          <button mat-icon-button color="primary" (click)="openForm(feed)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="onRemove(feed._id)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="feedDC"></tr>
      <tr mat-row *matRowDef="let row; columns: feedDC;"></tr>
    </table>
  </div>
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [pageSize]="feedPA.per_page"
    [length]="feedPA.total_elements" (page)="nextPage($event)"></mat-paginator>
</mat-card>
