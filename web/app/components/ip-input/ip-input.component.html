<div
  class="ip-input-wrapper"
  [class.size-large]="size === 'large'"
  [class.focused]="isFocused()"
  [class.hovered]="isHovered()"
  [class.valid]="isValid()"
  [class.invalid]="isInvalid()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <div class="ip-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3(15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
  </div>

  <input
    id="ip-search-input"
    class="ip-input-field"
    [formControl]="control"
    [placeholder]="placeholder"
    type="text"
    autocomplete="off"
    spellcheck="false"
    (input)="onInput()"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)"
    aria-label="Enter an IP address"
  />

  <div class="ip-badges">
    @if (ipVersion()) {
      <span class="ip-version-badge" [class.v6]="ipVersion() === 'IPv6'">{{ ipVersion() }}</span>
    }
    @if (isValid()) {
      <span class="ip-status valid">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
    }
    @if (isInvalid()) {
      <span class="ip-status invalid">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </span>
    }
    @if (control.value) {
      <button class="ip-clear-btn" type="button" (click)="clear()" aria-label="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    }
  </div>

  <button
    id="ip-search-btn"
    class="ip-search-btn"
    type="button"
    [disabled]="!isValid() || isLoading()"
    (click)="onSearch()"
    aria-label="Search IP"
  >
    @if (isLoading()) {
      <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" opacity="0.25"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    }
    <span>{{ isLoading() ? 'Searching...' : 'Search' }}</span>
  </button>
</div>

@if (isInvalid()) {
  <p class="ip-error-msg" role="alert">
    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Invalid IP address. Please enter a valid IPv4 or IPv6.
  </p>
}
