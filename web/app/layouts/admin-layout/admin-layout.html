<div class="admin-container">
  <mat-toolbar class="admin-header">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="brand-text"><mat-icon>shield</mat-icon> ipxa <small>Admin</small></span>
    <span class="spacer"></span>
    <button mat-button routerLink="/">
      <mat-icon>home</mat-icon> View Site
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="admin-sidenav-container">
    <mat-sidenav #sidenav 
      [mode]="(isHandset$ | async) ? 'over' : 'side'" 
      [opened]="(isHandset$ | async) === false" 
      class="admin-sidenav">
      <mat-nav-list>
        <a mat-list-item routerLink="/admin/workspaces" routerLinkActive="active" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon>workspaces</mat-icon>
          <span matListItemTitle>Workspaces</span>
        </a>
        <a mat-list-item routerLink="/admin/feeds" routerLinkActive="active" (click)="sidenav.mode === 'over' && sidenav.close()">
          <mat-icon matListItemIcon>rss_feed</mat-icon>
          <span matListItemTitle>Feeds</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="admin-content">
      <div class="page-container animate-in">
        <router-outlet></router-outlet>
      </div>
      <footer class="admin-footer">
        <span>&copy; 2026 ipxa · Advanced IP Intelligence Dashboard</span>
        <div class="spacer"></div>
        <span class="footer-tag">Open Source</span>
      </footer>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
